<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campionato MK — Gestionale Cup</title>
<style>
:root, [data-tema="notturno"]{
  --asfalto:#131622; --pista:#1d2233; --corsia:#2a3147; --corsia2:#343d59;
  --testata:#181d2d; --campo:#141828; --riga-hover:#232941;
  --kart:#e63329; --kart-scuro:#b7241c; --stella:#ffc800;
  --gesso:#eef0f7; --scia:#9aa3bd; --tubo:#3fc46a;
  --oro:#ffc800; --argento:#c7cedb; --bronzo:#d08a4e;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
[data-tema="arcobaleno"]{
  --asfalto:#0d0f1e; --pista:#181a2e; --corsia:#2b2d4d; --corsia2:#3b3e66;
  --testata:#13152a; --campo:#101226; --riga-hover:#22254a;
  --kart:#ff3d68; --kart-scuro:#d42a52; --stella:#ffd60a;
  --gesso:#f3f2ff; --scia:#a3a4cf; --tubo:#3ddc84;
}
[data-tema="yoshi"]{
  --asfalto:#edf6e6; --pista:#ffffff; --corsia:#d5e7c9; --corsia2:#bcd8a9;
  --testata:#e2f0d7; --campo:#f4faee; --riga-hover:#eef7e4;
  --kart:#3fae4f; --kart-scuro:#2f8c3d; --stella:#f28c00;
  --gesso:#22321f; --scia:#67795f; --tubo:#2f9e44;
  --oro:#f2a900; --argento:#9aa8b5; --bronzo:#c07b3e;
}
[data-tema="peach"]{
  --asfalto:#fdeff5; --pista:#ffffff; --corsia:#f4d2e1; --corsia2:#ecb9d0;
  --testata:#fae0eb; --campo:#fdf5f9; --riga-hover:#fbeaf2;
  --kart:#e84d8a; --kart-scuro:#c93a72; --stella:#f2a516;
  --gesso:#47212f; --scia:#a06e82; --tubo:#3fae4f;
  --oro:#f2a900; --argento:#9aa8b5; --bronzo:#c07b3e;
}
[data-tema="bowser"]{
  --asfalto:#190e0b; --pista:#291712; --corsia:#452419; --corsia2:#5c3222;
  --testata:#21120d; --campo:#1e100c; --riga-hover:#331b14;
  --kart:#ff5722; --kart-scuro:#d84315; --stella:#ffb300;
  --gesso:#ffefe6; --scia:#c79a8a; --tubo:#7cb342;
}
[data-tema="kalimari"]{
  --asfalto:#f6ecd8; --pista:#fffaf0; --corsia:#e7d4b1; --corsia2:#d9bf90;
  --testata:#efe1c4; --campo:#fdf6e8; --riga-hover:#f7efdd;
  --kart:#d9822b; --kart-scuro:#b7691c; --stella:#c0392b;
  --gesso:#3d2f1a; --scia:#8d7a57; --tubo:#5f8f3e;
  --oro:#d9a300; --argento:#9aa8b5; --bronzo:#b06e33;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-color:var(--corsia2) var(--asfalto)}
body{background:var(--asfalto);color:var(--gesso);font:15px/1.5 system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh}
button{font:inherit;cursor:pointer;border:none;color:inherit;background:none}
input,select{font:inherit;color:var(--gesso)}
:focus-visible{outline:2px solid var(--stella);outline-offset:2px;border-radius:4px}

/* ---------- header + firma bandiera a scacchi ---------- */
header{background:var(--testata);border-bottom:1px solid var(--corsia)}
.checker{height:12px;background:repeating-conic-gradient(#e9e9ec 0 25%,#191919 0 50%) 0 0/24px 24px;opacity:.92}
[data-tema="arcobaleno"] .checker{background:linear-gradient(90deg,#ff3d68,#ff9500,#ffd60a,#3ddc84,#38b6ff,#9b5bff);opacity:1}
.head-in{max-width:1180px;margin:0 auto;padding:14px 18px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
h1{font-family:'Arial Black','Arial Bold',Arial,sans-serif;font-size:clamp(20px,4vw,30px);font-style:italic;
   letter-spacing:-.5px;transform:skewX(-6deg);text-transform:uppercase;white-space:nowrap}
h1 .rosso{color:var(--kart)} h1 .giallo{color:var(--stella)}
.salvato{margin-left:auto;font-size:12px;color:var(--scia);display:flex;align-items:center;gap:6px}
.salvato .pallino{width:8px;height:8px;border-radius:50%;background:var(--tubo);transition:background .3s}
nav{max-width:1180px;margin:0 auto;padding:10px 18px 0;display:flex;gap:4px;overflow-x:auto}
nav button{padding:9px 16px 11px;border-radius:10px 10px 0 0;color:var(--scia);font-weight:600;white-space:nowrap;
  border-bottom:3px solid transparent}
nav button:hover{color:var(--gesso)}
nav button.attiva{color:var(--gesso);background:var(--pista);border-bottom-color:var(--kart)}

main{max-width:1180px;margin:0 auto;padding:22px 18px 70px}
.vista{display:none}.vista.attiva{display:block}
h2{font-family:'Arial Black',Arial,sans-serif;font-style:italic;transform:skewX(-6deg);text-transform:uppercase;
   font-size:19px;letter-spacing:.3px;margin:26px 0 14px}
h2:first-child{margin-top:0}
h2 small{font:600 12px/1 system-ui;color:var(--scia);font-style:normal;letter-spacing:1px;display:block;margin-bottom:4px}

/* ---------- componenti ---------- */
.card{background:var(--pista);border:1px solid var(--corsia);border-radius:14px;padding:16px}
.griglia{display:grid;gap:14px}
.pettorina{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:30px;padding:0 5px;
  border-radius:8px;background:var(--corsia);font:italic 800 14px var(--mono);flex:none}
.pettorina.p1{background:var(--oro);color:#181818}
.pettorina.p2{background:var(--argento);color:#181818}
.pettorina.p3{background:var(--bronzo);color:#181818}
.avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--corsia);flex:none;vertical-align:middle}
.avatar.gr{width:64px;height:64px}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--kart);border-radius:10px;padding:9px 16px;
  font-weight:700;color:#fff;transition:background .15s}
.btn:hover{background:var(--kart-scuro)}
.btn.ghost{background:var(--corsia);color:var(--gesso)} .btn.ghost:hover{background:var(--corsia2)}
.btn.mini{padding:5px 10px;font-size:13px;border-radius:8px}
.btn.pericolo{background:transparent;border:1px solid var(--kart);color:var(--kart)}
.btn.pericolo:hover{background:var(--kart);color:#fff}
.muto{color:var(--scia)} .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.chip{display:inline-block;padding:2px 9px;border-radius:99px;background:var(--corsia);font-size:12px;font-weight:600}
.avviso{border-left:3px solid var(--stella);background:color-mix(in srgb,var(--stella) 9%,transparent);
  padding:10px 14px;border-radius:0 10px 10px 0;font-size:14px;margin-bottom:8px}

/* tabelle */
.tab-scroll{overflow-x:auto;border:1px solid var(--corsia);border-radius:14px;background:var(--pista)}
table{border-collapse:collapse;width:100%;min-width:max-content}
th,td{padding:8px 11px;text-align:center;border-bottom:1px solid var(--corsia);font-size:14px;white-space:nowrap}
th{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--scia);background:var(--testata);
   position:sticky;top:0;z-index:2}
td:first-child,th:first-child{position:sticky;left:0;background:var(--pista);z-index:1;text-align:left}
th:first-child{background:var(--testata);z-index:3}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--riga-hover)}
tbody tr:hover td:first-child{background:var(--riga-hover)}
td.tot{font-weight:800;color:var(--stella)}
.cella-pilota{display:flex;align-items:center;gap:9px;font-weight:700}
input.punto{width:52px;background:var(--campo);border:1px solid var(--corsia);border-radius:7px;padding:6px 4px;
  text-align:center;font-family:var(--mono)}
input.punto:focus{border-color:var(--stella);outline:none}
input.campo{background:var(--campo);border:1px solid var(--corsia);border-radius:8px;padding:8px 10px;width:100%}
input.campo:focus{border-color:var(--stella);outline:none}
select.campo{background:var(--campo);border:1px solid var(--corsia);border-radius:8px;padding:8px 10px}

/* podio */
.podio{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:end}
.gradino{border-radius:14px;padding:18px 14px 14px;text-align:center;border:1px solid var(--corsia);background:var(--pista);position:relative}
.gradino .pos{font:italic 900 30px 'Arial Black',Arial;transform:skewX(-8deg);line-height:1}
.gradino .nome{font-weight:800;font-size:16px;margin:6px 0 2px}
.gradino .pt{font-family:var(--mono);color:var(--scia);font-size:13px}
.gradino .avatar{width:56px;height:56px;margin-top:10px;border:3px solid var(--corsia)}
.gradino.g1{border-color:var(--oro);padding-top:28px;order:2}
.gradino.g1 .pos{color:var(--oro)} .gradino.g1 .avatar{border-color:var(--oro);width:72px;height:72px}
.gradino.g2{order:1}.gradino.g2 .pos{color:var(--argento)} .gradino.g2 .avatar{border-color:var(--argento)}
.gradino.g3{order:3}.gradino.g3 .pos{color:var(--bronzo)} .gradino.g3 .avatar{border-color:var(--bronzo)}
.gradino.g1::before{content:"";position:absolute;inset:0 0 auto 0;height:10px;border-radius:14px 14px 0 0;
  background:repeating-conic-gradient(#e9e9ec 0 25%,#191919 0 50%) 0 0/16px 16px}
[data-tema="arcobaleno"] .gradino.g1::before{background:linear-gradient(90deg,#ff3d68,#ff9500,#ffd60a,#3ddc84,#38b6ff,#9b5bff)}

/* card cup */
.cup-card{cursor:pointer;transition:transform .12s,border-color .12s;text-align:left;width:100%}
.cup-card:hover{transform:translateY(-2px);border-color:var(--corsia2)}
.cup-card h3{font-style:italic;text-transform:uppercase;font-size:15px;letter-spacing:.3px;margin-bottom:10px;
  display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.cup-card h3 .num{color:var(--scia);font-size:12px}
.mini-podio{display:grid;gap:5px;font-size:13px}
.mini-podio div{display:flex;align-items:center;gap:8px}
.mini-podio .avatar{width:26px;height:26px}
.riga-form{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:14px}
.riga-form label{font-size:12px;color:var(--scia);display:block;margin-bottom:4px;font-weight:600}
dialog{background:var(--pista);color:var(--gesso);border:1px solid var(--corsia2);border-radius:16px;padding:22px;
  max-width:420px;width:calc(100% - 40px)}
dialog::backdrop{background:rgba(9,11,18,.75)}
.punti-gp-riga{display:flex;gap:6px;flex-wrap:wrap}
.punti-gp-riga input{width:56px}

/* temi + emoji picker */
.temi{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.tema-card{border:2px solid var(--corsia);border-radius:12px;overflow:hidden;cursor:pointer;text-align:left;background:var(--pista)}
.tema-card.attivo{border-color:var(--stella)}
.tema-card .strisce{height:36px;display:flex}
.tema-card .strisce span{flex:1}
.tema-card .nome-tema{padding:8px 10px;font-weight:700;font-size:13px}
.emoji-riga{display:flex;gap:4px;flex-wrap:wrap}
.emoji-riga button{font-size:19px;padding:3px 5px;border-radius:8px;line-height:1}
.emoji-riga button.sel{background:var(--corsia2)}
body.bloccato .solo-mod{display:none!important}
.loadout{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.loadout .box{background:var(--campo);border:1px solid var(--corsia);border-radius:12px;padding:10px;text-align:center;display:grid;gap:6px;justify-items:center}
.loadout .box img{height:52px;object-fit:contain}
.loadout .box .nm{font-size:12px;font-weight:700}
.picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:6px;max-height:250px;overflow:auto;margin-top:10px;padding:2px}
.picker button{background:var(--campo);border:1px solid var(--corsia);border-radius:10px;padding:6px 4px;display:grid;gap:4px;justify-items:center;font-size:10.5px;color:var(--scia);line-height:1.15}
.picker button img{height:40px;object-fit:contain}
.picker button.sel{border-color:var(--stella);color:var(--gesso)}
.picker button:hover{border-color:var(--corsia2)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px}
.stat{background:var(--campo);border:1px solid var(--corsia);border-radius:12px;padding:10px 6px;text-align:center}
.stat .v{font:800 20px var(--mono);color:var(--stella)} .stat .l{font-size:11px;color:var(--scia)}
.gradino.cliccabile{cursor:pointer}
.icona-cup{height:22px;width:22px;object-fit:contain;vertical-align:-5px}
.icona-cup.mini{height:15px;width:15px;vertical-align:-3px}
.assetto-btn{display:inline-flex;align-items:center;gap:5px;background:var(--campo);border:1px solid var(--corsia);
  border-radius:9px;padding:3px 7px;min-height:32px}
.assetto-btn img{height:24px;object-fit:contain}
button.assetto-btn:hover{border-color:var(--stella)}
.tab-assetto{display:flex;gap:6px;margin:10px 0 0}
.tab-assetto button{padding:6px 12px;border-radius:9px;background:var(--campo);border:1px solid var(--corsia);font-weight:700;font-size:13px}
.tab-assetto button.attiva{border-color:var(--stella);color:var(--stella)}
.legenda{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:12px}
.legenda span{display:inline-flex;align-items:center;gap:5px;color:var(--scia)}
.legenda i{width:10px;height:10px;border-radius:3px;display:inline-block}
#btn-lucchetto{white-space:nowrap}
footer{text-align:center;color:var(--scia);font-size:12px;padding:0 18px 30px}
@media(max-width:640px){
  .podio{gap:8px}.gradino .nome{font-size:13px}
  main{padding:16px 12px 60px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body data-tema="notturno">

<header>
  <div class="checker"></div>
  <div class="head-in">
    <h1 id="titolo-app"></h1>
    <button class="btn mini ghost" id="btn-lucchetto" onclick="toggleBlocco()">🔒 Solo lettura</button>
    <div class="salvato"><span class="pallino" id="pallino"></span><span id="stato-salvataggio">dati caricati</span></div>
  </div>
  <nav id="nav"></nav>
</header>

<main>
  <section class="vista" id="v-dashboard"></section>
  <section class="vista" id="v-classifica"></section>
  <section class="vista" id="v-cup"></section>
  <section class="vista" id="v-piloti"></section>
  <section class="vista" id="v-impostazioni"></section>
</main>
<footer>Gestionale campionato Mario Kart · i dati restano su questo dispositivo · modifiche protette da PIN · usa Esporta per backup e pubblicazione</footer>

<dialog id="dlg-scheda" style="max-width:660px"><div id="scheda-corpo"></div></dialog>
<dialog id="dlg-assetto" style="max-width:640px"><div id="assetto-corpo"></div></dialog>

<dialog id="dlg-cup">
  <h2 style="margin-top:0">Nuova cup</h2>
  <div style="display:grid;gap:12px">
    <div><label class="muto" style="font-size:12px;font-weight:600">Nome della cup</label>
      <input class="campo" id="nuova-cup-nome" placeholder="es. TURBO CUP"></div>
    <div><label class="muto" style="font-size:12px;font-weight:600">Numero di gare</label>
      <input class="campo" id="nuova-cup-gare" type="number" min="1" max="24" value="12"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:140px"><label class="muto" style="font-size:12px;font-weight:600">Tipo</label>
        <select class="campo" id="nuova-cup-tipo" style="width:100%">
          <option value="singola">Singola</option>
          <option value="squadre">A squadre ⚔️</option>
        </select></div>
      <div style="flex:1;min-width:140px"><label class="muto" style="font-size:12px;font-weight:600">Torneo</label>
        <select class="campo" id="nuova-cup-torneo" style="width:100%"></select></div>
    </div>
    <div><label class="muto" style="font-size:12px;font-weight:600">Icona della cup</label>
      <div class="picker" id="nuova-cup-icone" style="max-height:150px"></div></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn ghost" onclick="document.getElementById('dlg-cup').close()">Annulla</button>
      <button class="btn" onclick="confermaNuovaCup()">Crea cup</button>
    </div>
  </div>
</dialog>

/* ================= PERSISTENZA =================
   Nell'anteprima di Claude usa window.storage; su un sito vero
   (es. GitHub Pages) usa il localStorage del browser. */
const haStorageArtefatto = typeof window.storage !== 'undefined';
async function leggi(k){
  if(haStorageArtefatto){ try{ const r=await window.storage.get(k); return r?r.value:null; }catch(e){ return null; } }
  try{ return localStorage.getItem(k); }catch(e){ return null; }
}
async function scrivi(k,v){
  if(haStorageArtefatto){ try{ await window.storage.set(k,v); return true; }catch(e){ return false; } }
  try{ localStorage.setItem(k,v); return true; }catch(e){ return false; }
}
let salvaTimer=null, storageOk=true;
async function carica(){
  const v = await leggi(CHIAVE);
  if(v){ try{ stato = JSON.parse(v); }catch(e){} }
  if(!stato){
    stato = await leggiPubblicati();           // classifiche pubblicate dal gestore, se presenti
    if(!stato) stato = JSON.parse(JSON.stringify(DATI_INIZIALI));
    storageOk = await scrivi(CHIAVE, JSON.stringify(stato));
  }
  migra();
  // se il gestore ha pubblicato dati più recenti di quelli locali, prendili
  try{
    const pub = await leggiPubblicati();
    if(pub && pub.aggiornatoIl && (!stato.aggiornatoIl || pub.aggiornatoIl > stato.aggiornatoIl)){
      stato = pub; migra();
      await scrivi(CHIAVE, JSON.stringify(stato));
    }
  }catch(e){}
  ghCfg = await leggiCfgGH();
  segnaStato(storageOk?'dati caricati':'salvataggio non disponibile');
}
function salva(){
  stato.aggiornatoIl = new Date().toISOString();

  clearTimeout(salvaTimer);
  salvaTimer = setTimeout(async ()=>{
    storageOk = await scrivi(CHIAVE, JSON.stringify(stato));
    segnaStato(storageOk?'salvato':'salvataggio non disponibile');
    programmaAutoPub();

}

/* ================= BLOCCO MODIFICHE (PIN) =================
   Protezione leggera pensata per un gruppo di amici: chi non ha
   il PIN può solo guardare. Non è una cassaforte: su un sito
   statico i dati restano comunque sul dispositivo di chi guarda. */
async function hashPin(pin){
  try{
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('mk·'+pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    let h=5381; const s='mk·'+pin;
    for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))>>>0;
    return 'x'+h.toString(16);
  }
}
async function toggleBlocco(){
  if(MOD){ MOD=false; render(); return; }
  if(!stato.pinHash){
    const p1 = prompt('Prima volta: scegli un PIN che servirà per modificare (condividilo solo con chi gestisce il campionato).');
    if(!p1) return;
    const p2 = prompt('Ripeti il PIN:');
    if(p1!==p2){ alert('I due PIN non coincidono, riprova.'); return; }
    stato.pinHash = await hashPin(p1); MOD = true; salva(); render(); return;
  }
  const p = prompt('PIN per modificare:');
  if(p===null) return;
  if(await hashPin(p) === stato.pinHash){ MOD = true; render(); }
  else alert('PIN sbagliato.');
}
function richiediSblocco(){ alert('Modalità solo lettura: tocca il lucchetto in alto e inserisci il PIN per modificare.'); }
async function cambiaPin(){
  if(!MOD) return richiediSblocco();
  const p1 = prompt('Nuovo PIN:'); if(!p1) return;
  const p2 = prompt('Ripeti il nuovo PIN:');
  if(p1!==p2){ alert('I due PIN non coincidono.'); return; }
  stato.pinHash = await hashPin(p1); salva(); alert('PIN aggiornato.');
}

async function leggiPubblicati(){
  try{
    const r = await fetch('dati.json', {cache:'no-store'});
    if(!r.ok) return null;
    const d = await r.json();
    if(!d.piloti || !d.cups || !d.puntiGP) return null;
    return d;
  }catch(e){ return null; }
}

    if(c.assetti===undefined)c.assetti={};
    if(c.tipo===undefined)c.tipo='singola';
    if(!idsTornei.includes(c.torneo)) c.torneo=idsTornei[0]; });
}

/* ================= PUBBLICAZIONE SU GITHUB =================
   Il pulsante "Pubblica ora" scrive dati.json nel repository del sito
   usando le API di GitHub. Serve un token personale (solo permesso
   Contents su quel repository), che resta SOLO su questo dispositivo:
   non viene mai esportato né incluso in dati.json. */
const CHIAVE_GH = 'mk_github_cfg';
let ghCfg = {owner:'', repo:'', branch:'main', token:''};
async function leggiCfgGH(){
  try{ const v = await leggi(CHIAVE_GH); if(v) return {...ghCfg, ...JSON.parse(v)}; }catch(e){}
  return ghCfg;
}
function setCfgGH(campo, val){
  if(!MOD){ richiediSblocco(); return; }
  ghCfg[campo] = (typeof val==='boolean') ? val : val.trim();
  scrivi(CHIAVE_GH, JSON.stringify(ghCfg));
}
let autoPubTimer = null;
function programmaAutoPub(){
  if(!(MOD && ghCfg && ghCfg.auto && ghCfg.token && ghCfg.owner && ghCfg.repo)) return;
  clearTimeout(autoPubTimer);
  autoPubTimer = setTimeout(()=>pubblicaSuGitHub(true), 4000);
}
function b64utf8(s){
  const b = new TextEncoder().encode(s); let bin=''; const CH=0x8000;
  for(let i=0;i<b.length;i+=CH) bin += String.fromCharCode.apply(null, b.subarray(i, i+CH));
  return btoa(bin);
}
function setPubStato(msg){ const el=document.getElementById('pub-stato'); if(el) el.textContent=msg; }
let pubInCorso = false;
async function shaAttuale(url, branch, hdr){
  // legge la versione corrente di dati.json (senza cache); undefined se non esiste ancora
  const g = await fetch(`${url}?ref=${branch}&t=${Date.now()}`, {headers:hdr, cache:'no-store'});
  if(g.status===200) return (await g.json()).sha;
  if(g.status===404) return undefined;
  if(g.status===401 || g.status===403) throw new Error('accesso negato ('+g.status+'): controlla il token e i suoi permessi (Contents: Read and write).');
  throw new Error('lettura repo: '+g.status);
}
async function pubblicaSuGitHub(auto){
  if(!MOD){ if(!auto) richiediSblocco(); return; }
  if(!ghCfg.owner || !ghCfg.repo || !ghCfg.token){
    if(!auto) alert('Compila utente GitHub, nome repository e token nella sezione Pubblicazione.'); return;
  }
  if(pubInCorso) return;           // evita il doppio click
  pubInCorso = true;
  const branch = ghCfg.branch || 'main';
  const url = `https://api.github.com/repos/${ghCfg.owner}/${ghCfg.repo}/contents/dati.json`;
  const hdr = {Authorization:'Bearer '+ghCfg.token, Accept:'application/vnd.github+json'};
  try{
    const contenuto = b64utf8(JSON.stringify(stato));
    for(let tentativo=1; tentativo<=3; tentativo++){
      setPubStato(tentativo===1 ? 'pubblicazione in corso…' : `il file era cambiato nel frattempo, riprovo (${tentativo}/3)…`);
      const sha = await shaAttuale(url, branch, hdr);   // versione fresca a ogni tentativo
      const corpo = {message:'Aggiorna classifiche — '+new Date().toLocaleString('it-IT'), content:contenuto, branch};
      if(sha) corpo.sha = sha;
      const p = await fetch(url, {method:'PUT', headers:{...hdr,'Content-Type':'application/json'}, body:JSON.stringify(corpo)});
      if(p.ok){
        setPubStato('✅ pubblicato! Il sito si aggiorna entro un minuto circa.');
        if(auto) segnaStato('salvato · pubblicato ✓');
        return; }
      if(p.status===409 && tentativo<3) continue;       // conflitto di versione: riprova con lo sha nuovo
      const info = await p.json().catch(()=>({}));
      if(p.status===409) throw new Error('conflitto persistente: qualcun altro sta pubblicando nello stesso momento? Riprova tra qualche secondo.');
      if(p.status===401 || p.status===403) throw new Error('accesso negato: controlla il token e che abbia il permesso Contents: Read and write su questo repository.');
      if(p.status===404) throw new Error('repository o branch non trovato: controlla utente, nome repository e branch.');
      throw new Error('scrittura: '+p.status+(info.message?' — '+info.message:''));
    }
  }catch(e){
    setPubStato('❌ '+(e.message||e));
  }finally{
    pubInCorso = false;
  }
}

/* ================= LOGICA (identica all'Excel) ================= */
function puntiPilota(cup, nome){ return cup.results[nome] || Array(cup.races.length).fill(0); }
function totaleCup(cup, nome){ return puntiPilota(cup, nome).reduce((a,b)=>a+(+b||0),0); }
function classificaCup(cup){
  const righe = stato.piloti.map((p,i)=>({nome:p.nome, scuderia:p.scuderia, tot:totaleCup(cup,p.nome), i}));
  righe.sort((a,b)=> b.tot-a.tot || a.i-b.i);
  righe.forEach((r,idx)=>{ r.pos=idx+1; r.gp = r.tot>0 && idx<stato.puntiGP.length ? stato.puntiGP[idx] : 0; });
  return righe;
}
function puntiGPdi(cup, nome){ const r = classificaCup(cup).find(x=>x.nome===nome); return r ? r.gp : 0; }
function classificaGenerale(cups){
  cups = cups || stato.cups;
  const righe = stato.piloti.map((p,i)=>{
    const perCup = cups.map(c=>puntiGPdi(c,p.nome));
    return {nome:p.nome, scuderia:p.scuderia, perCup, tot:perCup.reduce((a,b)=>a+b,0), i};
  });
  righe.sort((a,b)=> b.tot-a.tot || a.i-b.i);
  righe.forEach(r=>{ r.pos = 1 + righe.filter(x=>x.tot>r.tot).length; });
  return righe;
}
function classificaSquadre(cups){
  const gen = classificaGenerale(cups);
  const righe = stato.scuderie.map(s=>({nome:s, tot: gen.filter(p=>p.scuderia===s).reduce((a,p)=>a+p.tot,0)}));
  righe.sort((a,b)=>b.tot-a.tot);
  righe.forEach(r=>{ r.pos = 1 + righe.filter(x=>x.tot>r.tot).length; });
  return righe;
}
/* ================= TORNEI / GRAN PRIX ================= */
let torneoAttivo = null;
function tornei(){ return stato.tornei || []; }
function torneoCorrenteId(){
  if(torneoAttivo==='*' ) return '*';
  if(torneoAttivo && tornei().some(t=>t.id===torneoAttivo)) return torneoAttivo;
  return tornei().length ? tornei()[0].id : '*';
}
function cupsDelTorneo(){
  const id = torneoCorrenteId();
  return id==='*' ? stato.cups : stato.cups.filter(c=>c.torneo===id);
}
function selettoreTorneo(){
  if(tornei().length < 2) return '';
  const id = torneoCorrenteId();
  return `<div class="riga-form" style="margin-bottom:12px"><div style="min-width:240px">
    <label>🏁 Gran Prix / torneo</label>
    <select class="campo" style="width:100%" onchange="torneoAttivo=this.value;render()">
      ${tornei().map(t=>`<option value="${t.id}" ${id===t.id?'selected':''}>${esc(t.nome)}</option>`).join('')}
      <option value="*" ${id==='*'?'selected':''}>🌍 Tutti i tornei</option>
    </select></div></div>`;
}
function nomeTorneo(id){ const t = tornei().find(x=>x.id===id); return t ? t.nome : ''; }
function classificaSquadreCup(c){
  const cl = classificaCup(c);
  const righe = stato.scuderie.map(s=>({nome:s, tot: cl.filter(r=>r.scuderia===s).reduce((a,r)=>a+r.tot,0)}));
  righe.sort((a,b)=>b.tot-a.tot);
  righe.forEach(r=>{ r.pos = 1 + righe.filter(x=>x.tot>r.tot).length; });
  return righe;
}

function avvisi(){
  const out = [], visti = {};
  stato.piloti.forEach(p=>{ visti[p.nome]=(visti[p.nome]||0)+1; });
  Object.keys(visti).filter(n=>visti[n]>1).forEach(n=>out.push(`Il pilota “${n}” compare ${visti[n]} volte nell'anagrafica.`));
  stato.cups.forEach(c=>{ if(stato.piloti.every(p=>totaleCup(c,p.nome)===0)) out.push(`La cup “${c.name}” non ha ancora punteggi.`); });
  stato.piloti.forEach(p=>{ if(!p.scuderia) out.push(`“${p.nome}” non ha una scuderia assegnata.`); });
  return out;
}

function statistichePilota(nome, cups){
  cups = cups || stato.cups;
  let vitt=0, disp=0, punti=0, cupDisp=0, cupVinte=0, podi=0, best=null;
  cups.forEach(c=>{
    const massimi = c.races.map((_,gi)=>Math.max(...stato.piloti.map(p=>(puntiPilota(c,p.nome)[gi]||0))));
    const pts = puntiPilota(c,nome);
    pts.forEach((v,gi)=>{ if(v>0){ disp++; punti+=v; if(v===massimi[gi]) vitt++; } });
    const r = classificaCup(c).find(x=>x.nome===nome);
    if(r && r.tot>0){
      cupDisp++; if(r.pos===1)cupVinte++; if(r.pos<=3)podi++;
      if(!best || r.tot>best.tot) best={cup:c.name, tot:r.tot, icona:c.icona};
    }
  });
  const g = classificaGenerale(cups).find(x=>x.nome===nome);
  return {vitt, disp, punti, cupDisp, cupVinte, podi, best,
          gp: g?g.tot:0, pos: g?g.pos:'—', media: disp?(punti/disp).toFixed(1):'0'};
}

function recordCampionato(){
  const cupsT = cupsDelTorneo();
  if(!cupsT.length || !stato.piloti.length) return '';
  const ss = stato.piloti.map(p=>({nome:p.nome, ...statistichePilota(p.nome, cupsT)}));
  const top = (k)=>{ const m=[...ss].sort((a,b)=>b[k]-a[k])[0]; return (m && m[k]>0) ? m : null; };
  const mediaTop = [...ss].filter(x=>x.disp>=10).sort((a,b)=>+b.media-+a.media)[0];
  const righe = [
    ['🏎️','Più gare vinte', top('vitt'), x=>x.vitt+' vittorie'],
    ['🏆','Più cup vinte', top('cupVinte'), x=>x.cupVinte+' cup'],
    ['🥉','Più podi nelle cup', top('podi'), x=>x.podi+' podi'],
    ['🎯','Miglior media (min 10 gare)', mediaTop, x=>x.media+' punti/gara'],
    ['🛞','Più gare corse', top('disp'), x=>x.disp+' gare'],
  ].filter(r=>r[2]);
  if(!righe.length) return '';
  return `<h2><small>I primati del campionato</small>Record</h2>
    <div class="griglia" style="grid-template-columns:repeat(auto-fit,minmax(190px,1fr))">
      ${righe.map(([em,tit,r,fmt])=>`<div class="card" style="display:flex;gap:10px;align-items:center;cursor:pointer" onclick="apriScheda('${esc(r.nome)}')" title="Apri la scheda">
        <span style="font-size:24px">${em}</span>
        <div><div class="muto" style="font-size:11px;font-weight:700">${tit.toUpperCase()}</div>
        <div style="font-weight:800">${etichetta(r.nome)}</div>
        <div class="num muto" style="font-size:12px">${fmt(r)}</div></div></div>`).join('')}
    </div>`;
}

function graficoCampionato(){
  const cupsT = cupsDelTorneo();
  const nCup = cupsT.length;
  if(nCup < 2) return '';
  const serie = stato.piloti.map((p,i)=>{
    let s=0; return {nome:p.nome, i, y:cupsT.map(c=>s+=puntiGPdi(c,p.nome))};
  }).filter(r=>r.y[r.y.length-1]>0);
  const maxY = Math.max(1, ...serie.map(r=>r.y[nCup-1]));
  const W=760,H=280,L=42,B=30,T=10,R=14;
  const px=k=>L+(W-L-R)*k/(nCup-1);
  const py=v=>T+(H-T-B)*(1-v/maxY);
  const col=i=>`hsl(${(i*137)%360} 72% 58%)`;
  let griglia='';
  for(let g=0; g<=4; g++){
    const v = Math.round(maxY*g/4);
    griglia += `<line x1="${L}" y1="${py(v)}" x2="${W-R}" y2="${py(v)}" stroke="var(--corsia)" stroke-width="1"/>
      <text x="${L-6}" y="${py(v)+4}" text-anchor="end" font-size="10" fill="var(--scia)">${v}</text>`;
  }
  let xlab='';
  cupsT.forEach((c,k)=>{ xlab += `<text x="${px(k)}" y="${H-10}" text-anchor="middle" font-size="10" fill="var(--scia)">${k+1}</text>`; });
  const ordinati = [...serie].sort((a,b)=>b.y[nCup-1]-a.y[nCup-1]);
  const linee = serie.map(r=>{
    const pts = r.y.map((v,k)=>px(k)+','+py(v)).join(' ');
    const primo = (r===ordinati[0]);
    return `<polyline fill="none" stroke="${col(r.i)}" stroke-width="${primo?3.2:2}" opacity="${primo?1:.8}" points="${pts}"/>
      <circle cx="${px(nCup-1)}" cy="${py(r.y[nCup-1])}" r="${primo?4.5:3}" fill="${col(r.i)}"/>`;
  }).join('');
  return `<h2><small>Punti GP cumulativi, cup dopo cup (1 = ${esc(cupsT[0].name)})</small>Andamento del campionato</h2>
    <div class="card">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" role="img" aria-label="Grafico andamento campionato">
        ${griglia}${xlab}${linee}
      </svg>
      <div class="legenda">${ordinati.map(r=>`<span><i style="background:${col(r.i)}"></i>${etichetta(r.nome)} <b class="num">${r.y[nCup-1]}</b></span>`).join('')}</div>
    </div>`;
}

      <div><button class="btn mini ghost" onclick="aggiungiScuderia()">+ Aggiungi scuderia</button></div>
    </div>
    <h2><small>Il pulsante che aggiorna dati.json nel repository del sito</small>Pubblicazione su GitHub</h2>
    <div class="card" style="display:grid;gap:12px">
      <div class="griglia" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">
        <div><label class="muto" style="font-size:12px;font-weight:600">Utente GitHub</label>
          <input class="campo" value="${esc(ghCfg.owner)}" placeholder="es. mariorossi" onchange="setCfgGH('owner',this.value)"></div>
        <div><label class="muto" style="font-size:12px;font-weight:600">Repository</label>
          <input class="campo" value="${esc(ghCfg.repo)}" placeholder="es. campionato-mk" onchange="setCfgGH('repo',this.value)"></div>
        <div><label class="muto" style="font-size:12px;font-weight:600">Branch</label>
          <input class="campo" value="${esc(ghCfg.branch)}" placeholder="main" onchange="setCfgGH('branch',this.value)"></div>
        <div><label class="muto" style="font-size:12px;font-weight:600">Token (resta solo su questo dispositivo)</label>
          <input class="campo" type="password" value="${esc(ghCfg.token)}" placeholder="github_pat_…" onchange="setCfgGH('token',this.value)"></div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn" onclick="pubblicaSuGitHub()">📤 Pubblica ora</button>
        <label style="display:inline-flex;align-items:center;gap:7px;font-size:13px;cursor:pointer">
          <input type="checkbox" ${ghCfg.auto?'checked':''} onchange="setCfgGH('auto', this.checked)">
          Pubblica automaticamente dopo ogni modifica</label>
        <span class="muto" id="pub-stato" style="font-size:13px"></span>
      </div>
      <p class="muto" style="font-size:13px">Come creare il token: GitHub → Settings → Developer settings → Fine-grained tokens → Generate new token → scegli solo il repository del sito → permesso <b>Contents: Read and write</b>. Il token non viene mai esportato né pubblicato: chi visita il sito non può vederlo.</p>
    </div>
    </div>
    <h2><small>Backup, pubblicazione e sicurezza</small>Dati</h2>
    <div class="card" style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn ghost" onclick="esporta()">Esporta dati (JSON)</button>
      <button class="btn ghost" onclick="aggiornaDaPubblicati()">Aggiorna dai dati pubblicati</button>
      <label class="btn ghost solo-mod" style="cursor:pointer">Importa dati<input type="file" accept=".json" hidden onchange="importa(this)"></label>
      <button class="btn ghost solo-mod" onclick="cambiaPin()">Cambia PIN</button>
      <button class="btn pericolo solo-mod" onclick="ripristina()">Ripristina dati originali dell'Excel</button>
    </div>
    <p class="muto" style="font-size:13px;margin-top:10px">Il modo più comodo per condividere le classifiche è il pulsante <b>Pubblica ora</b> qui sopra. In alternativa manuale: Esporta dati → rinomina in <b>dati.json</b> → caricalo nel repository. Chi apre il sito riceve automaticamente i dati pubblicati più recenti.</p>`;
}

function render(){
  applicaTema();
  document.body.classList.toggle('bloccato', !MOD);
  const bl = document.getElementById('btn-lucchetto');
  bl.textContent = MOD ? '🔓 Modifiche attive · blocca' : '🔒 Solo lettura · sblocca';
  renderNav();
  document.querySelectorAll('.vista').forEach(v=>v.classList.remove('attiva'));
  document.getElementById('v-'+vistaAttiva).classList.add('attiva');
  ({dashboard:renderDashboard, classifica:renderClassifica, cup:renderCup,
    piloti:renderPiloti, impostazioni:renderImpostazioni})[vistaAttiva]();
}
function dopoModifica(){ salva(); render(); }

/* ================= AZIONI ================= */
let iconaCupPicker = false, regolePicker = false, regoleTab = 'personaggi';
const CAMPO_REGOLA = {personaggi:'personaggiConcessi', veicoli:'veicoliConcessi', oggetti:'oggettiConcessi'};
function apriCup(i){ if(i===''||isNaN(i))return; cupAperta=i; iconaCupPicker=false; regolePicker=false; vistaAttiva='cup'; render(); }
function toggleRegola(tipo, id){
  if(!MOD){ richiediSblocco(); return; }
  const arr = stato.cups[cupAperta][CAMPO_REGOLA[tipo]];
  const k = arr.indexOf(id);
  if(k>=0) arr.splice(k,1); else arr.push(id);
  salva(); render();
}
function setRegole(modo){
  if(!MOD){ richiediSblocco(); return; }
  const c = stato.cups[cupAperta];
  c[CAMPO_REGOLA[regoleTab]] = (modo==='tutti') ? ASSETS[regoleTab].map(a=>a.id) : [];
  salva(); render();
}
function rigaRegola(titolo, tipo, arr, vuoto){
  const icone = arr.length
    ? arr.map(id=>`<span title="${esc((asset(tipo,id)||{}).nome||'')}">${assetImg(tipo,id,24)}</span>`).join(' ')
    : `<span class="chip">${vuoto}</span>`;
  return `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <span class="muto" style="font-size:11px;font-weight:700;letter-spacing:.5px;min-width:104px">${titolo}</span>${icone}</div>`;
}
function regoleMini(c){
  const tot = (c.personaggiConcessi||[]).length + (c.veicoliConcessi||[]).length + (c.oggettiConcessi||[]).length;
  if(!tot) return '';
  const pezzo = (tipo,arr,max)=> arr.slice(0,max).map(id=>assetImg(tipo,id,17)).join('') + (arr.length>max?`<span class="muto" style="font-size:10px">+${arr.length-max}</span>`:'');
  return `<div style="display:flex;gap:5px;margin-top:9px;align-items:center;flex-wrap:wrap">
    <span class="muto" style="font-size:10px;font-weight:700;letter-spacing:.5px">REGOLE</span>
    ${pezzo('personaggi', c.personaggiConcessi||[], 3)}
    ${pezzo('veicoli', c.veicoliConcessi||[], 2)}
    ${(c.oggettiConcessi||[]).length?`<span class="chip" style="font-size:10px;padding:1px 7px">🎁 ${c.oggettiConcessi.length}</span>`:''}
  </div>`;
}
function setTorneoCup(id){
  if(!MOD){ richiediSblocco(); return; }
  stato.cups[cupAperta].torneo = id;
  dopoModifica();
}
function setTipoCup(v){
  if(!MOD){ richiediSblocco(); return; }
  stato.cups[cupAperta].tipo = (v==='squadre'?'squadre':'singola');
  dopoModifica();
}
function setIconaCup(id){
  if(!MOD){ richiediSblocco(); return; }
  const c = stato.cups[cupAperta];
  c.icona = (c.icona===id ? '' : id);
  iconaCupPicker = false; dopoModifica();
}
let nuovaCupIcona = '';
function apriDialogCup(){
  if(!MOD){ richiediSblocco(); return; }
  document.getElementById('nuova-cup-nome').value='';
  document.getElementById('nuova-cup-gare').value=12;
  nuovaCupIcona = '';
  disegnaIconeNuovaCup();
  const idT = torneoCorrenteId();
  document.getElementById('nuova-cup-torneo').innerHTML = tornei().map(t=>
    `<option value="${t.id}" ${t.id===idT?'selected':''}>${esc(t.nome)}</option>`).join('');
  document.getElementById('nuova-cup-tipo').value = 'singola';
  document.getElementById('dlg-cup').showModal(); }
function disegnaIconeNuovaCup(){
  document.getElementById('nuova-cup-icone').innerHTML = ASSETS.icone.map(a=>
    `<button class="${nuovaCupIcona===a.id?'sel':''}" onclick="nuovaCupIcona=(nuovaCupIcona==='${a.id}'?'':'${a.id}');disegnaIconeNuovaCup()">
      <img src="${a.img}" alt=""><span>${esc(a.nome)}</span></button>`).join('');
}
function confermaNuovaCup(){
  if(!MOD){ richiediSblocco(); return; }
  const nome = document.getElementById('nuova-cup-nome').value.trim();
  const n = Math.max(1, Math.min(24, +document.getElementById('nuova-cup-gare').value || 12));
  if(!nome){ alert('Scrivi il nome della cup.'); return; }
  if(stato.cups.some(c=>c.name.toLowerCase()===nome.toLowerCase())){ alert('Esiste già una cup con questo nome.'); return; }
  stato.cups.push({name:nome, races:Array.from({length:n},(_,i)=>'Gara '+(i+1)), results:{},
    icona:nuovaCupIcona,
    tipo: document.getElementById('nuova-cup-tipo').value==='squadre'?'squadre':'singola',
    torneo: document.getElementById('nuova-cup-torneo').value || (tornei()[0]&&tornei()[0].id),
    oggettiConcessi:[], personaggiConcessi:[], veicoliConcessi:[], assetti:{}});
  document.getElementById('dlg-cup').close();
  cupAperta = stato.cups.length-1; vistaAttiva='cup'; dopoModifica();
}
function setPunto(gi, nome, val){
  if(!MOD){ richiediSblocco(); return; }
  const c = stato.cups[cupAperta];
  if(!c.results[nome]) c.results[nome] = Array(c.races.length).fill(0);
  while(c.results[nome].length < c.races.length) c.results[nome].push(0);
  c.results[nome][gi] = Math.max(0, +val || 0);
  dopoModifica();
}
function rinominaGara(gi){
  if(!MOD){ richiediSblocco(); return; }
  const c = stato.cups[cupAperta];
  const n = prompt('Nome della gara:', c.races[gi]);
  if(n && n.trim()){ c.races[gi]=n.trim(); dopoModifica(); }
}
function aggiungiGara(){
  if(!MOD){ richiediSblocco(); return; }
  const c = stato.cups[cupAperta];
  c.races.push('Gara '+(c.races.length+1));
  Object.values(c.results).forEach(a=>a.push(0));
  dopoModifica();
}
function rinominaCup(){
  if(!MOD){ richiediSblocco(); return; }
  const c = stato.cups[cupAperta];
  const n = prompt('Nuovo nome della cup:', c.name);
  if(n && n.trim()){ c.name=n.trim(); dopoModifica(); }
}
function eliminaCup(){
  if(!MOD){ richiediSblocco(); return; }
  const c = stato.cups[cupAperta];
  if(!confirm(`Eliminare “${c.name}” e tutti i suoi punteggi? L'operazione non si può annullare.`)) return;
  stato.cups.splice(cupAperta,1); cupAperta=null; dopoModifica();
}
function aggiungiPilota(){
  if(!MOD){ richiediSblocco(); return; }
  const n = prompt('Nome del nuovo pilota:');
  if(!n || !n.trim()) return;
  stato.piloti.push({nome:n.trim(), codice:'', scuderia:'', note:'', avatar:'', emoji:''});
  dopoModifica();
}
function modPilota(i, campo, val){
  if(!MOD){ richiediSblocco(); return; }
  const vecchio = stato.piloti[i].nome;
  stato.piloti[i][campo] = campo==='emoji' ? val : val.trim();
  if(campo==='nome' && val.trim() && val.trim()!==vecchio){
    stato.cups.forEach(c=>{ if(c.results[vecchio]){ c.results[val.trim()]=c.results[vecchio]; delete c.results[vecchio]; } });
  }
  dopoModifica();
}
function caricaAvatar(i, inp){
  if(!MOD){ richiediSblocco(); return; }
  const f = inp.files[0]; if(!f) return;
  const img = new Image();
  img.onload = ()=>{
    const cv = document.createElement('canvas'); const S=128;
    cv.width=S; cv.height=S;
    const ctx = cv.getContext('2d');
    const lato = Math.min(img.width, img.height);
    ctx.drawImage(img, (img.width-lato)/2, (img.height-lato)/2, lato, lato, 0,0,S,S);
    stato.piloti[i].avatar = cv.toDataURL('image/png');
    URL.revokeObjectURL(img.src);
    dopoModifica();
  };
  img.src = URL.createObjectURL(f);
}
function eliminaPilota(i){
  if(!MOD){ richiediSblocco(); return; }
  const p = stato.piloti[i];
  if(!confirm(`Eliminare “${p.nome}”? I suoi punteggi in tutte le cup verranno rimossi.`)) return;
  stato.cups.forEach(c=>{ delete c.results[p.nome]; });
  stato.piloti.splice(i,1); dopoModifica();
}
function aggiungiTorneo(){
  if(!MOD){ richiediSblocco(); return; }
  const n = prompt('Nome del nuovo torneo (es. "Gran Prix Estate 2026"):');
  if(!n || !n.trim()) return;
  stato.tornei.push({id:'t'+Date.now(), nome:n.trim()});
  dopoModifica();
}
function rinominaTorneo(i,val){
  if(!MOD){ richiediSblocco(); return; }
  if(val.trim()) stato.tornei[i].nome = val.trim();
  dopoModifica();
}
function eliminaTorneo(i){
  if(!MOD){ richiediSblocco(); return; }
  if(stato.tornei.length<2) return;
  const tr = stato.tornei[i];
  const nCup = stato.cups.filter(c=>c.torneo===tr.id).length;
  if(!confirm(`Eliminare il torneo “${tr.nome}”?${nCup?` Le sue ${nCup} cup passeranno al primo torneo della lista.`:''}`)) return;
  stato.tornei.splice(i,1);
  const primo = stato.tornei[0].id;
  stato.cups.forEach(c=>{ if(c.torneo===tr.id) c.torneo=primo; });
  if(torneoAttivo===tr.id) torneoAttivo=primo;
  dopoModifica();
}
function setPuntoGP(i,val){
  if(!MOD){ richiediSblocco(); return; } stato.puntiGP[i]=Math.max(0,+val||0); dopoModifica(); }
function aggiungiScuderia(){
  if(!MOD){ richiediSblocco(); return; } const n=prompt('Nome della scuderia:'); if(n&&n.trim()){ stato.scuderie.push(n.trim()); dopoModifica(); } }
function rinominaScuderia(i,val){
  if(!MOD){ richiediSblocco(); return; }
  const vecchio = stato.scuderie[i]; const nuovo = val.trim();
  if(!nuovo) return;
  stato.scuderie[i]=nuovo;
  stato.piloti.forEach(p=>{ if(p.scuderia===vecchio) p.scuderia=nuovo; });
  dopoModifica();
}
function eliminaScuderia(i){
  if(!MOD){ richiediSblocco(); return; }
  const s = stato.scuderie[i];
  if(!confirm(`Eliminare la scuderia “${s}”? I piloti resteranno senza team.`)) return;
  stato.piloti.forEach(p=>{ if(p.scuderia===s) p.scuderia=''; });
  stato.scuderie.splice(i,1); dopoModifica();
}
function esporta(){
  const blob = new Blob([JSON.stringify(stato,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'campionato-mk.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importa(inp){
  if(!MOD){ richiediSblocco(); return; }
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{
      const d = JSON.parse(r.result);
      if(!d.piloti || !d.cups || !d.puntiGP) throw 0;
      stato = d; migra();
      dopoModifica();
    }catch(e){ alert('File non valido: serve un JSON esportato da questa app.'); } };
  r.readAsText(f);
}
function ripristina(){
  if(!MOD){ richiediSblocco(); return; }
  if(!confirm('Tornare ai dati originali dell\'Excel? Le modifiche fatte qui andranno perse.')) return;
  stato = JSON.parse(JSON.stringify(DATI_INIZIALI)); dopoModifica();
}

/* ================= AVVIO ================= */
carica().then(render);
</script>
